    weight    = 2
    contentDir   = "content/fr"
    copyright = '<a href="https://creativecommons.org/licenses/by-nc/4.0/" target="_blank" rel="noopener">CC BY-NC 4.0</a>'
    
    [languages.fr.menu]
  [[languages.fr.menu.main]]
    
    identifier   = "about"
    name         = "À propos"
    url          = "/fr/about/"
    weight       = 1
  [[languages.fr.menu.main]]
    identifier   = "posts"
    name         = "Postes"
    url          = "/fr/posts/"
    weight       = 2
  [[languages.fr.menu.main]]
    identifier   = "projects"
    name         = "Projets"
    url          = "/fr/projects/"
    weight       = 3
  [[languages.fr.menu.main]]
    identifier   = "tags"
    name         = "Tags"
    url          = "/fr/tags/"
    weight       = 4
  [[languages.fr.menu.main]]
    identifier   = "categories"
    name         = "Categories"
    url          = "/fr/categories/"
    weight       = 5
    
  [languages.fr.params]
    subtitle  = "Hello Friend NG Theme"

